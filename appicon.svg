<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Градиентный фон -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a5f8f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Основной фон - скруглённый квадрат -->
  <rect x="16" y="16" width="224" height="224" rx="48" ry="48" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Блик сверху -->
  <rect x="16" y="16" width="224" height="100" rx="48" ry="48" fill="url(#highlightGradient)" clip-path="inset(0 0 120 0)"/>
  
  <!-- Буква "P" стилизованная -->
  <g fill="#ffffff" filter="url(#shadow)">
    <!-- Вертикальная часть P -->
    <rect x="70" y="60" width="28" height="136" rx="14" ry="14"/>
    <!-- Верхняя дуга P -->
    <path d="M 98 60 L 150 60 A 46 46 0 0 1 150 152 L 98 152 Z"/>
    <!-- Внутренняя часть дуги -->
    <ellipse cx="124" cy="106" rx="32" ry="32" fill="#4a90d9"/>
  </g>
  
  <!-- Текст "MD" внизу -->
  <text x="128" y="215" font-family="Arial Black, sans-serif" font-size="42" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#shadow)">MD</text>
  
  <!-- Рамка по краю -->
  <rect x="16" y="16" width="224" height="224" rx="48" ry="48" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.2"/>
</svg>
